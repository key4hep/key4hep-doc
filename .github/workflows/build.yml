name: Build preview
on:
  workflow_call:
    inputs:
      ref:
        description: The git ref for which the preview should be built
        type: string
        required: true
      linkcheck:
        description: Run the link-check and fail the workflow if it fails
        type: boolean
        required: false
        default: true
      upload-artifact:
        description: Upload an artifact for downstream consumption
        type: boolean
        required: false
        default: true
      pr-number:
        description: The PR number for identifying dependent PRs
        type: string
        required: false
        default: ''
      generate-overviews:
        description: Run the overview generation jobs (not needed for linkcheck-only runs)
        type: boolean
        required: false
        default: true

jobs:
  generate-alg-overview:
    if: ${{ inputs.generate-overviews }}
    uses: ./.github/workflows/generate_overview.yml
    with:
      ref: ${{ inputs.ref }}
      collect-script: scripts/collect_gaudi_alg_info.py
      placeholder: docs/algorithm-overview.md
      item-label: algorithm
      property-label: property
      filter-config: scripts/filter_gaudi.yaml

  generate-proc-overview:
    if: ${{ inputs.generate-overviews }}
    uses: ./.github/workflows/generate_overview.yml
    with:
      ref: ${{ inputs.ref }}
      collect-script: scripts/collect_marlin_processor_info.py
      placeholder: docs/processor-overview.md
      item-label: processor
      property-label: parameter
      filter-config: scripts/filter_marlin.yaml

  build:
    needs: [generate-alg-overview, generate-proc-overview]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
    - uses: actions/setup-python@v6
      with:
        python-version: 3.12
        cache: pip
    - name: Install Requirements
      run: |
          pip install --upgrade pip
          pip install -r requirements.txt
    - name: Download algorithm overview
      if: ${{ inputs.generate-overviews }}
      uses: actions/download-artifact@v6
      with:
        name: docs-algorithm-overview.md
        path: docs/
    - name: Download processor overview
      if: ${{ inputs.generate-overviews }}
      uses: actions/download-artifact@v6
      with:
        name: docs-processor-overview.md
        path: docs/
    - name: Fetch external sources from upstream PR
      if: ${{ inputs.pr-number != '' }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        bash scripts/fetch_upstream_pr_sources.sh ${{ inputs.pr-number }}
    - name: Fetch external sources
      run: |
        bash scripts/fetch_external_sources.sh
    - name: Build documentation
      run: |
        sphinx-build -M html docs build
    - name: Run linkcheck
      if: ${{ inputs.linkcheck }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        sphinx-build -b linkcheck docs linkcheck
    - uses: actions/upload-pages-artifact@v4
      if: ${{ inputs.upload-artifact }}
      with:
        path: build/html
